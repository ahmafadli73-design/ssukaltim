<!DOCTYPE html>
<html lang="id">
<head>
{`   
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel=\"manifest\" href=\"/manifest.json\">
    <meta name=\"theme-color\" content=\"#f59e0b\">
    <title>Sistem Dashboard | PT Shafira Satya Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f172a; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; }
        .loader-container {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #0f172a; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-container">
        <div class="mb-6">
            <i class="fas fa-circle-notch fa-spin text-indigo-500 text-5xl"></i>
        </div>
        <h2 class="text-white text-xl font-bold tracking-widest uppercase">SSU DIGITAL SYSTEM</h2>
        <p class="text-slate-400 mt-2 animate-pulse font-sans text-sm">Menghubungkan ke Server SSU...</p>
    </div>

    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycbyE-k8sZ55PifDnNj_xxLNAjtv-woC2JXSd4mhWuO8hhBwuDSl5H7iur780Nng1syMg/exec"></iframe>

    <script>
        var loader = document.getElementById('loader');
        
        // Loader akan hilang otomatis setelah 4 detik
        // Memberikan waktu untuk script Google memuat di belakang layar
        setTimeout(function() {
            loader.style.transition = "opacity 0.5s ease";
            loader.style.opacity = "0";
            setTimeout(function() {
                loader.style.display = 'none';
            }, 500);
        }, 4000);
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');}
    </script> 
</body>
</html>
