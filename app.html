<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Dashboard | PT Shafira Satya Utama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f172a; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10; }
        .loader-container {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: center; background: #0f172a; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="loader" class="loader-container">
        <div class="mb-6">
            <i class="fas fa-circle-notch fa-spin text-indigo-500 text-5xl"></i>
        </div>
        <h2 class="text-white text-xl font-bold tracking-widest uppercase">PT SSU DIGITAL SYSTEM</h2>
        <p class="text-slate-400 mt-2 animate-pulse">Menghubungkan ke Server SSU...</p>
    </div>

    <iframe id="appFrame" src="https://script.google.com/macros/s/AKfycby6viOiA5CIbvwz8ukFC8GhGSz_PNYkxv4FGGazg5paCJ0YnokTm3YJ29KikiWXvhuG/execc"></iframe>

    <script>
        // MASUKKAN LINK GOOGLE SCRIPT BUNG DI SINI
        var googleScriptUrl = "https://script.google.com/macros/s/AKfycby6viOiA5CIbvwz8ukFC8GhGSz_PNYkxv4FGGazg5paCJ0YnokTm3YJ29KikiWXvhuG/exec";
        
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        var frame = document.getElementById('appFrame');
        var loader = document.getElementById('loader');

        if (isMobile) {
            // Jika di HP, langsung lempar (Redirect) supaya tidak error "Unable to open"
            window.location.href = googleScriptUrl;
        } else {
            // Jika di Laptop, tetap di dalam frame biar keren
            frame.src = googleScriptUrl;
            
            // Sembunyikan loader setelah 3 detik (asumsi script sudah mulai muat)
            setTimeout(function() {
                loader.style.display = 'none';
            }, 3500);
        }
    </script>
</body>
</html>
