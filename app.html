<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard System | PT Shafira Satya Utama</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #0f172a; }
        iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: none;
        }
        .loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div class="loader">
        <div style="margin-bottom: 20px;"><i class="fas fa-circle-notch fa-spin"></i></div>
        <p>Menghubungkan ke Server SSU...</p>
    </div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycby...URL_WEB_APP_BUNG.../exec"
        allow="geolocation; microphone; camera;">
    </iframe>
</body>
</html>
