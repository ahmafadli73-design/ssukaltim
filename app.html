<!DOCTYPE html>
<html>
<head>
    <title>PT SSU | Digital System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #0f172a; color: white; font-family: sans-serif; display: flex; justify-content: center; items-center; height: 100vh; margin: 0; }
        .loader { text-align: center; }
    </style>
</head>
<body>
    <div class="loader">
        <p>Menghubungkan ke Secure Server PT SSU...</p>
    </div>

    <script>
        // MASUKKAN LINK GOOGLE SCRIPT BUNG DI SINI
        var googleScriptUrl = "https://script.google.com/macros/s/AKfycby_URL_BUNG_ASLI/exec";

        // Cek apakah user pakai HP atau Laptop
        var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        if (isMobile) {
            // Jika di HP, langsung lempar ke link asli agar tidak "Unable to open"
            window.location.href = googleScriptUrl;
        } else {
            // Jika di Laptop, biarkan terbuka di dalam sini (URL tetap rapi)
            document.body.innerHTML = '<iframe src="' + googleScriptUrl + '" style="position:fixed; top:0; left:0; bottom:0; right:0; width:100%; height:100%; border:none; margin:0; padding:0; overflow:hidden; z-index:999999;"></iframe>';
        }
    </script>
</body>
</html>
